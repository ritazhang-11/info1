<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout Payment</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
   .checkout-page-body { margin: 0; background: #fff; }
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 520px;
      gap: 80px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 48px 100px;
    }
    .checkout-left { background: #f8f9fb; padding: 40px; border-radius: 2px; }
    .checkout-left h2 {
      font-family: Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 0 0 30px;
      padding-bottom: 16px;
      border-bottom: 1px solid #ddd;
    }
    .checkout-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 20px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #eee;
    }
    .checknot-item-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      background: #eee;
    }
    .checkout-item-info h4 {
      font-family: Arial, sans-serif;
      font-size: 16px;
      margin: 0 0 6px;
      letter-spacing: 0.02em;
    }
    .checkout-item-info p {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #666;
      margin: 0;
    }
    .checkout-item-price {
      text-align: right;
      font-family: Arial, sans-serif;
      font-size: 16px;
      font-weight: 700;
    }
    .checkout-right { position: sticky; top: 60px; align-self: start; }
    .checkout-card {
      border: 2px solid #111;
      padding: 40px;
      background: #fff;
    }
    .checkout-card h1 {
      font-family: Arial, sans-serif;
      font-size: 26px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin: 0 0 30px;
    }
    .checkout-card h2 {
      font-family: Arial, sans-serif;
      font-size: 15px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin: 30px 0 20px;
      color: #333;
    }
    .field { margin: 0 0 22px; }
    .field label {
      display: block;
      font-family: Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      border: 0;
      border-bottom: 2px solid #ddd;
      height: 40px;
      font-size: 16px;
      padding: 0 4px;
      outline: none;
    }
    .field input:focus { border-color: #111; }
    .hint {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #888;
      margin: -12px 0 24px;
    }
    .order-summary {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #111;
    }
    .sum-row {
      display: flex;
      justify-content: space-between;
      font-family: Arial, sans-serif;
      font-size: 14px;
      margin: 12px 0;
    }
    .sum-total {
      display: flex;
      justify-content: space-between;
      font-weight: 900;
      font-size: 18px;
      border-top: 2px solid #111;
      padding-top: 16px;
      margin-top: 16px;
    }
    .continue-btn {
      margin-top: 26px;
      width: 100%;
      height: 60px;
      background: #111;
      color: #fff;
      border: 0;
      font-family: Arial, sans-serif;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 15px;
      cursor: pointer;
    }
    .continue-btn:hover { opacity: 0.9; }

    @media (max-width: 1100px) {
      .checkout-layout { grid-template-columns: 1fr; gap: 40px; padding: 24px; }
      .checkout-right { position: static; }
    }
  </style>
</head>

<body class="checkout-page-body">
  <header class="site-header">
    <a class="brand" href="home.html">Art Lovers Australia</a>
    <nav class="header-icons">
      <button class="icon-btn" data-open-search aria-label="Search">
        <span class="icon search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </span>
      </button>
      <a class="icon-btn fav-top" href="wishlist.html" aria-label="Wishlist">
      <span class="icon heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span>
      </a>
      <a class="icon-btn" href="cart.html" aria-label="Cart">
        <span class="icon cart">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        </span>
      </a>
    </nav>
  </header>

  <div class="checkout-layout">
    <div class="checkout-left">
      <h2>Your Order Items</h2>
      <div id="checkoutItems"></div>
    </div>

    <div class="checkout-right">
      <section class="checkout-card">
        <h1>Checkout Payment</h1>

        <form id="checkoutForm">
          <h2>Digital Delivery Information</h2>

          <div class="field">
            <label for="first">First Name</label>
            <input id="first" value="Haidan" required />
          </div>

          <div class="field">
            <label for="last">Last Name</label>
            <input id="last" value="Zhang" required />
          </div>

          <div class="field">
            <label for="email">Email Address</label>
            <input id="email" type="email" value="HDZzzz777@gmail.com" required />
          </div>
          <div class="hint">Your high-resolution digital file will be sent here.</div>

          <div class="field">
            <label for="wallet">Wallet Address</label>
            <input id="wallet" value="2843 4872 3948" required />
          </div>

          <div class="order-summary">
            <div class="sum-row">
              <span>Subtotal</span>
              <span id="sumSubtotal">$0</span>
            </div>
            <div class="sum-row">
              <span>Tax (7.75%)</span>
              <span id="sumTax">$0</span>
            </div>
            <div class="sum-row">
              <span>Shipping</span>
              <span>Free</span>
            </div>
            <div class="sum-total">
              <span>Total</span>
              <span id="sumTotal">$0</span>

          <button class="continue-btn" type="submit">Continue to Payment</button>
        </form>
      </section>
      </div>
      </div>
  
</body>
</html>
