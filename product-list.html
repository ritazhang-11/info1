<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Art Lovers Australia - Product List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="list-page">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="home.html">Art Lovers Australia</a>
      <nav class="header-icons" aria-label="Main navigation">
        <button class="icon-btn" data-open-search aria-label="Search">
          <span class="icon search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
        </button>
        <a class="icon-btn fav-top" href="wishlist.html" aria-label="Wishlist">
          <span class="icon heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span>
        </a>
        <a class="icon-btn" href="cart.html" aria-label="Cart">
          <span class="icon cart">
            <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          </span>
        </a>
      </nav>
    </header>

    <main class="content">
      <nav class="breadcrumb">
        <a href="home.html">Home</a>
        <span class="chev">›</span>
        <span>List</span>
      </nav>

      <section class="list-top">
        <div>
          <button class="filter-btn" data-open-filter aria-label="Filter">
            <i></i><b></b><em></em><span></span>
          </button>

          <div class="filter-options">
            <button class="filter-option" data-filter="all">All Artworks</button>
            <button class="filter-option" data-filter="cold">Cold Colour</button>
            <button class="filter-option" data-filter="warm">Warm Colour</button>
            <button class="filter-option" data-sort="asc">Price: Low to High</button>
            <button class="filter-option" data-sort="desc">Price: High to Low</button>
          </div>
        </div>

        <div class="view-icons" aria-label="Layout switcher">
          <a class="layout-icon" href="product-list2.html" aria-label="Vertical layout">
            <span></span><span></span><span></span><span></span>
          </a> 
          <a class="layout-icon three active" href="product-list.html" aria-label="Grid layout">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span>
          </a>
        </div>
      </section>

      <section class="art-grid"></section>

      <div class="end-block">
        <button class="icon-btn tech" data-back-top>Back to the top<span class="up">⌃</span></button>
      </div>
    </main>

    <footer class="footer">
      <a class="brand" href="home.html">Art Lovers Australia</a>
      <nav class="footer-nav" aria-label="Footer links">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Index</a>
        <a href="#">Submission</a>
      </nav>
      <div class="copyright">© 2026 Art Lovers Australia. All rights reserved.</div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
