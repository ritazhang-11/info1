<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Transaction Verified</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<style>
    .confirm-page {
      position: relative;
      min-height: calc(100vh - 63px - 74px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: #ffffff;
      overflow: hidden;
    }

    .shape-1 {
      position: absolute;
      left: 0;
      top: 0;
      width: 65%;
      height: 100%;
      background: #e0e0e0;
      z-index: 1;
    }

    .shape-2 {
      position: absolute;
      right: 8%;
      top: 12%;
      width: 36%;
      height: 76%;
      background: #f0ebe7;
      z-index: 2;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    .confirmation-box {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 1100px;
      display: grid;
      grid-template-columns: 62% 38%;
      align-items: center;
    }

    .confirmation-left {
      padding: 0 60px;
    }

    .verified {
      font-family: Arial, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 12px;
      color: #427c97;
      margin-bottom: 16px;
    }

    .success {
      font-family: Arial, sans-serif;
      font-size: 76px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin: 0 0 36px;
      line-height: 1;
      font-weight: 700;
    }

    .order-ref {
      font-family: Arial, sans-serif;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .ref-code {
      font-family: Arial, sans-serif;
      font-size: 17px;
      letter-spacing: 0.08em;
      margin-bottom: 52px;
    }

    .receipt {
      width: 100%;
      margin: 0;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      font-family: Arial, sans-serif;
      font-size: 18px;
      letter-spacing: 0.04em;
      margin: 16px 0;
      text-transform: uppercase;
    }

    .receipt-row.muted {
      color: #777;
      font-size: 16px;
    }

    .receipt-total {
      border-top: 2px solid #111;
      margin-top: 28px;
      padding-top: 28px;
      font-size: 24px;
      font-weight: 800;
    }

    .confirmation-right {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    .back-home {
      background: #111;
      color: #fff;
      padding: 20px 64px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      transition: opacity 0.2s;
      border: none;
      cursor: pointer;
    }

    .back-home:hover {
      opacity: 0.9;
    }

    @media (max-width: 1100px) {
      .shape-1 { width: 100%; }
      .shape-2 { display: none; }
      .confirmation-box { grid-template-columns: 1fr; }
      .confirmation-left { padding: 0 20px; text-align: center; }
      .success { font-size: 52px; }
      .confirmation-right { margin-top: 40px; }
    }
  </style>
</head>


<body class="confirmation-page">
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="home.html">Art Lovers Australia</a>
      <nav class="header-icons" aria-label="Main navigation">
        <button class="icon-btn" data-open-search aria-label="Search">
          <span class="icon search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
        </button>
        <a class="icon-btn fav-top" href="wishlist.html" aria-label="Wishlist">
          <span class="icon heart"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span>
        </a>
        <a class="icon-btn" href="cart.html" aria-label="Cart">
          <span class="icon cart"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></span>
        </a>
      </nav>
    </header>

    <main class="confirm-page">
      <div class="shape-1"></div>
      <div class="shape-2"></div>

      <div class="confirmation-box">
        <div class="confirmation-left">
          <div class="verified">Transaction Verified</div>
          <h1 class="success">Success</h1>

          <div class="order-ref">Order Reference</div>
          <div class="ref-code" id="orderRef">---</div>

          <div class="receipt" id="orderReceipt"></div>
        </div>

        <div class="confirmation-right">
          <a class="back-home" href="home.html">Back to home page</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      <a class="brand" href="home.html">Art Lovers Australia</a>
      <nav class="footer-nav" aria-label="Footer links">
        <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Index</a><a href="#">Submission</a>
      </nav>
      <div class="copyright">© 2026 Art Lovers Australia. All rights reserved.</div>
    </footer>
  </div>

</body>
</html>
