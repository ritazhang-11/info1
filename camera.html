<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no" />
  <title>Camera Preview | Art Lovers Australia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas Neue&family=Cinzel:wght:400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="camera-wrap">
  <header class="cam-header">
    <a href="index.html" class="back-btn">‹</a>
    <img src="assets/camera.png" class="camera-icon" alt="Camera">
  </header>

  <section class="preview-area">
    <img src="assets/camerapic.png" alt="Room preview" class="room-img">
  </section>

  <a href="product-pages.html?id=herald" class="art-info-bar-link">
    <section class="art-info-bar">
      <img src="assets/the-herald.jpg" alt="The Herald art" class="thumb-art">
      <div class="art-text">
        <div>
          <div class="art-title">THE HERALD</div>
          <div class="art-author">EMMA COOMBES</div>
        </div>
        <div class="art-price">AUD$600</div>
      </div>
    </section>
  </a>

  <footer class="cam-footer">
    <button class="shoot-btn" disabled></button>
  </footer>
</div>

</body>
</html>
